AWSTemplateFormatVersion: '2010-09-09'
Description: 'ExamLab — EC2 Stack with Docker Deployment'

Parameters:
  ProjectName:
    Type: String
    Default: examlab
    Description: Project name used for resource naming

  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
    Description: Environment name

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

  KeyName:
    Type: String
    Description: SSH Key Pair name for EC2 access

  AppPort:
    Type: Number
    Default: 3000
    Description: Application port inside container

  DBPassword:
    Type: String
    NoEcho: true
    Description: PostgreSQL password

  DBName:
    Type: String
    Default: examlab
    Description: Database name

  DockerImage:
    Type: String
    Default: node:20-alpine
    Description: Docker base image

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Project Configuration"
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: "EC2 Configuration"
        Parameters:
          - InstanceType
          - KeyName
          - AppPort
      - Label:
          default: "Database Configuration"
        Parameters:
          - DBPassword
          - DBName

Resources:
  # ─────────────────────────────────────────────────────────────────────────
  # Security Groups
  # ─────────────────────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-alb-${Environment}-sg'
      GroupDescription: Security group for Application Load Balancer
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from anywhere
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-${Environment}'

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-ec2-${Environment}-sg'
      GroupDescription: Security group for EC2 instances running Docker
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: App traffic from ALB
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: HTTP from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-${Environment}'

  # ─────────────────────────────────────────────────────────────────────────
  # IAM Roles for EC2
  # ─────────────────────────────────────────────────────────────────────────

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ec2-${Environment}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EC2ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:GetAuthorizationToken
                Resource: '*'
        - PolicyName: S3BackupAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectName}-backups-${Environment}/*'
                  - !Sub 'arn:aws:s3:::${ProjectName}-backups-${Environment}'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ─────────────────────────────────────────────────────────────────────────
  # Load Balancer
  # ─────────────────────────────────────────────────────────────────────────

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb-${Environment}'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Sub '{{resolve:secretsmanager:${ProjectName}-vpc:SecretString:PublicSubnet1Id}}'
        - !Sub '{{resolve:secretsmanager:${ProjectName}-vpc:SecretString:PublicSubnet2Id}}'
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-${Environment}'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg-${Environment}'
      Port: !Ref AppPort
      Protocol: HTTP
      VpcId: !Sub '{{resolve:secretsmanager:${ProjectName}-vpc:SecretString:VpcId}}'
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: 'lb_cookie'
        - Key: stickiness.lb_cookie.duration_seconds
          Value: '86400'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tg-${Environment}'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !GetAtt ApplicationLoadBalancer.Arn
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !GetAtt TargetGroup.Arn

  # ─────────────────────────────────────────────────────────────────────────
  # Launch Template with Docker
  # ─────────────────────────────────────────────────────────────────────────

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${ProjectName}-${Environment}-template'
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-instance-${Environment}'
              - Key: Environment
                Value: !Ref Environment
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-volume-${Environment}'
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            # Log all output
            exec > >(tee /var/log/user-data.log)
            exec 2>&1

            echo "=== Starting ExamLab Docker deployment ==="

            # Update system
            yum update -y

            # Install Docker
            amazon-linux-extras install docker -y
            systemctl start docker
            systemctl enable docker

            # Install Docker Compose
            curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose

            # Create app directories
            mkdir -p /home/ec2-user/app
            mkdir -p /home/ec2-user/app/backups

            # Create .env file
            cat > /home/ec2-user/app/.env << 'ENVFILE'
            PROJECT_NAME=${ProjectName}
            ENVIRONMENT=${Environment}
            POSTGRES_PASSWORD=${DBPassword}
            POSTGRES_DB=${DBName}
            NODE_ENV=production
            HOST=0.0.0.0
            PORT=${AppPort}
            SUPABASE_URL=http://localhost:8000
            SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YW1sYWIiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYwMzk0OTgwMCwiZXhwIjoxNjM0NDgwODAwfQ.MOCK_KEY
            SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YW1sYWIiLCJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjAzOTQ5ODAwLCJleHAiOjE2MzQ0ODA4MDB9.MOCK_KEY
            ENVFILE

            # Set permissions
            chown -R ec2-user:ec2-user /home/ec2-user/app

            # Create docker-compose.yml
            cat > /home/ec2-user/app/docker-compose.yml << 'COMPOSEFILE'
            version: '3.9'

            services:
              postgres:
                image: postgres:15-alpine
                environment:
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  POSTGRES_DB: ${POSTGRES_DB}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped

              supabase:
                image: supabase/supabase:latest
                depends_on:
                  - postgres
                environment:
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "8000:8000"
                restart: unless-stopped

              app:
                image: node:20-alpine
                depends_on:
                  - postgres
                  - supabase
                environment:
                  NODE_ENV: production
                  PORT: ${PORT}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  POSTGRES_DB: ${POSTGRES_DB}
                ports:
                  - "${PORT}:${PORT}"
                volumes:
                  - ./app:/app
                working_dir: /app
                command: npm start
                restart: unless-stopped

            volumes:
              postgres_data:
                driver: local
            COMPOSEFILE

            # Start services
            cd /home/ec2-user/app
            docker-compose up -d

            echo "=== ExamLab Docker deployment completed ==="

            # CloudWatch metric
            aws cloudwatch put-metric-data \
              --metric-name DockerDeploymentSuccess \
              --namespace ExamLab \
              --value 1 \
              --region ${AWS::Region}

  # ─────────────────────────────────────────────────────────────────────────
  # Auto Scaling Group
  # ─────────────────────────────────────────────────────────────────────────

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub '${ProjectName}-asg-${Environment}'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - !Sub '{{resolve:secretsmanager:${ProjectName}-vpc:SecretString:PrivateSubnet1Id}}'
        - !Sub '{{resolve:secretsmanager:${ProjectName}-vpc:SecretString:PrivateSubnet2Id}}'
      TargetGroupARNs:
        - !GetAtt TargetGroup.Arn
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-asg-${Environment}'
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref Environment
          PropagateAtLaunch: true

  # ─────────────────────────────────────────────────────────────────────────
  # Auto Scaling Policies
  # ─────────────────────────────────────────────────────────────────────────

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AutoScalingGroup
      Cooldown: 300
      ScalingAdjustment: 1

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AutoScalingGroup
      Cooldown: 300
      ScalingAdjustment: -1

  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-cpu-high-${Environment}'
      AlarmDescription: Scale up if CPU > 75%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 75
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleUpPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

  CPUAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-cpu-low-${Environment}'
      AlarmDescription: Scale down if CPU < 25%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 25
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleDownPolicy
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup

  # ─────────────────────────────────────────────────────────────────────────
  # CloudWatch Logs
  # ─────────────────────────────────────────────────────────────────────────

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ec2/${ProjectName}-${Environment}'
      RetentionInDays: 7

Outputs:
  ALBDNSName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-alb-dns-${Environment}'

  ALBUrl:
    Description: URL to access the application
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'

  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !GetAtt TargetGroup.Arn
    Export:
      Name: !Sub '${ProjectName}-tg-arn-${Environment}'

  AutoScalingGroupName:
    Description: Name of the Auto Scaling Group
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub '${ProjectName}-asg-name-${Environment}'

  LogGroupName:
    Description: CloudWatch Log Group name
    Value: !Ref LogGroup
    Export:
      Name: !Sub '${ProjectName}-log-group-${Environment}'

  EC2SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub '${ProjectName}-ec2-sg-${Environment}'

  ALBSecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-alb-sg-${Environment}'
