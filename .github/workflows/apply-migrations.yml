# Aplica las migraciones SQL nuevas de supabase/migrations/ al proyecto
# Supabase configurado en los GitHub Secrets.
#
# Por que este workflow:
#   Antes Lovable Cloud aplicaba las migrations automaticamente al hacer
#   "Publish". Despues de migrar a un Supabase propio, Lovable solo
#   despliega el frontend — las migrations las debe aplicar este
#   pipeline en cada push a main que toque supabase/migrations/.
#
# Como funciona:
#   Por cada archivo en supabase/migrations/ (orden alfabetico), si la
#   `version` (prefijo timestamp) NO existe en `supabase_migrations.schema_migrations`
#   del remoto, lo aplica vía psql con `ON CONFLICT DO NOTHING` en el
#   tracking. Esto garantiza idempotencia perfecta sin depender del
#   estado interno del CLI de supabase.
#
#   Por que NO usamos `supabase db push`:
#   - Tuvo un bug intermitente: tras `migration repair --status applied`,
#     el push seguia incluyendo la version "reparada" como pendiente,
#     causando bucles infinitos.
#   - El push trata el `statements` como hash de contenido; cualquier
#     cambio en el archivo (espacios, comentarios) tras aplicarse hace
#     que el CLI piense que es "otra" migration.
#   psql + ON CONFLICT por version es mas robusto: la version es la
#   primary key, lo demas no importa para deduplicar.
#
# Secrets requeridos en GitHub:
#   - SUPABASE_PROJECT_REF
#   - SUPABASE_DB_URL: Session Pooler (puerto 5432), no la direct connection.
name: Apply DB Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/apply-migrations.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo mostrar las migrations pendientes sin aplicarlas'
        required: true
        type: boolean
        default: false

concurrency:
  group: apply-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validar secrets
        run: |
          set -euo pipefail
          missing=0
          [ -z "$DB_URL" ] && { echo "::error::SUPABASE_DB_URL no configurado."; missing=1; }
          [ -z "$REF" ] && { echo "::error::SUPABASE_PROJECT_REF no configurado."; missing=1; }
          [ $missing -eq 0 ] || exit 1

          # Detectar accidentalmente la direct connection (no funciona desde GH Actions).
          case "$DB_URL" in
            *"@db."*.supabase.co*)
              echo "::error::SUPABASE_DB_URL apunta a 'db.<ref>.supabase.co' (direct connection, solo IPv6)."
              echo "::error::Necesitas el Session Pooler (host *.pooler.supabase.com puerto 5432)."
              exit 1
              ;;
          esac
          echo "✓ Secrets validados"

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Listar migrations locales vs remotas
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/supabase/migrations"

          echo "=== Migrations LOCALES ==="
          ls -1 *.sql 2>/dev/null | sort | nl -w3 -s'  '
          local_count=$(ls -1 *.sql 2>/dev/null | wc -l)
          echo "Total: $local_count archivos"

          echo ""
          echo "=== Migrations APLICADAS en remoto ==="
          psql "$DB_URL" -t -A -c "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version" | tee /tmp/applied_versions.txt
          applied_count=$(wc -l < /tmp/applied_versions.txt)
          echo "Total: $applied_count versiones aplicadas"

          echo ""
          echo "=== PENDIENTES de aplicar ==="
          pending=0
          for file in $(ls -1 *.sql 2>/dev/null | sort); do
            version=$(echo "$file" | grep -oE '^[0-9]+' | head -1)
            [ -z "$version" ] && continue
            if ! grep -qx "$version" /tmp/applied_versions.txt; then
              echo "  - $file"
              pending=$((pending + 1))
            fi
          done
          if [ "$pending" -eq 0 ]; then
            echo "  (ninguna - todo al dia)"
          fi
          echo "Total pendientes: $pending"

      - name: Aplicar migrations
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        # Importante: NADA de heredocs aquí. El parser YAML interpreta
        # cualquier línea sin indentación dentro del bloque como un nuevo
        # key, y un SQL con `SELECT ...:` al margen rompe todo. Usamos
        # archivo temporal y psql -f para mantener el SQL fuera del YAML.
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/supabase/migrations"

          # Releer lista de aplicadas (puede haber cambiado entre steps)
          psql "$DB_URL" -t -A -c "SELECT version FROM supabase_migrations.schema_migrations ORDER BY version" > /tmp/applied_versions.txt

          applied_now=0
          skipped=0
          failed=0
          for file in $(ls -1 *.sql 2>/dev/null | sort); do
            version=$(echo "$file" | grep -oE '^[0-9]+' | head -1)
            if [ -z "$version" ]; then
              echo "  Saltando $file (sin prefijo de version)"
              continue
            fi

            name=$(basename "$file" .sql | sed "s/^${version}_//")

            if grep -qx "$version" /tmp/applied_versions.txt; then
              skipped=$((skipped + 1))
              continue
            fi

            echo ""
            echo "Aplicando ${version}_${name}..."

            # Armar un archivo temporal con:
            #   1) BEGIN;
            #   2) contenido del .sql
            #   3) INSERT idempotente en schema_migrations
            #   4) COMMIT;
            # Esto se pasa a psql con -f. Si algo falla, ROLLBACK por la transacción.
            tmpfile=$(mktemp --suffix=.sql)
            {
              echo "BEGIN;"
              cat "$file"
              echo ""
              echo "INSERT INTO supabase_migrations.schema_migrations(version, name, statements) VALUES ('${version}', '${name}', ARRAY[]::text[]) ON CONFLICT (version) DO NOTHING;"
              echo "COMMIT;"
            } > "$tmpfile"

            if psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$tmpfile" > /tmp/psql_out 2>&1; then
              applied_now=$((applied_now + 1))
              echo "OK ${version}_${name} aplicada"
              rm -f "$tmpfile"
            else
              failed=$((failed + 1))
              echo "::error::Fallo aplicando ${version}_${name}"
              echo "---- salida de psql ----"
              cat /tmp/psql_out
              echo "------------------------"
              rm -f "$tmpfile"
            fi
          done

          echo ""
          echo "Resumen:"
          echo "  Aplicadas en esta corrida: $applied_now"
          echo "  Saltadas (ya estaban):     $skipped"
          echo "  Fallidas:                  $failed"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed migracion(es) fallaron"
            exit 1
          fi

      - name: Verificar estado final
        run: |
          echo ""
          echo "=== Versiones aplicadas (ultimas 15) ==="
          psql "$DB_URL" -c "SELECT version, name FROM supabase_migrations.schema_migrations ORDER BY version DESC LIMIT 15;"

      - name: Resumen
        if: ${{ always() }}
        run: |
          echo ""
          echo "Migrations aplicadas al proyecto: $REF"
          echo "Dashboard: https://supabase.com/dashboard/project/$REF/database/migrations"
