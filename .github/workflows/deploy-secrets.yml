# Despliega los SECRETS (variables de entorno) de las edge functions al
# proyecto Supabase propio, usando el mismo token de CI que deploy-edge-functions.
#
# Por que este workflow:
#   Tras migrar a un Supabase propio, Lovable ya NO gestiona los secrets de
#   las edge functions. deploy-edge-functions.yml despliega el CODIGO; este
#   despliega las VARIABLES DE ENTORNO que esas funciones leen
#   (Deno.env.get(...)). Es manual (workflow_dispatch) porque cambiar secrets
#   no debe pasar en cada push.
#
# Como usarlo:
#   1. Settings -> Secrets and variables -> Actions: cargar los valores de los
#      secrets que quieras desplegar (con los NOMBRES EXACTOS de abajo).
#      NOMBRES CORREGIDOS (la app los lee asi):
#        - GOOGLE_OAUTH_CLIENT_ID      (NO GOOGLE_CLIENT_ID)
#        - GOOGLE_OAUTH_CLIENT_SECRET  (NO GOOGLE_SECRET_KEY)
#      VAPID_PRIVATE_KEY: pegar el valor LIMPIO (sin URLs incrustadas).
#   2. Actions -> "Deploy Edge Secrets" -> Run workflow.
#
# Solo setea los secrets que esten NO vacios en GitHub Secrets — los demas se
# saltan (no se sobreescriben con cadena vacia). NO toca SUPABASE_URL /
# SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY: Supabase los inyecta solo.
#
# Secrets de infraestructura requeridos (ya usados por deploy-edge-functions):
#   - SUPABASE_PROJECT_REF
#   - SUPABASE_ACCESS_TOKEN  (sbp_... valido — NO el del repo, que fue revocado)
name: Deploy Edge Secrets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo listar que secrets se setearian (no aplica cambios)'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validar token + ref
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${REF}" ]; then
            echo "::error::SUPABASE_PROJECT_REF no configurado."; exit 1
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN no configurado."; exit 1
          fi
          echo "ok"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest

      - name: Preparar config.toml minimo
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p /tmp/sb-secrets/supabase
          printf 'project_id = "%s"\n' "$REF" > /tmp/sb-secrets/supabase/config.toml

      - name: Set edge secrets (solo los no vacios)
        working-directory: /tmp/sb-secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          DRY_RUN: ${{ inputs.dry_run }}
          # ── Cada secret se lee de GitHub Secrets. Los que no existan
          #    quedan vacios y se saltan. NOMBRES CANONICOS que leen los edges. ──
          APP_PUBLIC_URL: ${{ secrets.APP_PUBLIC_URL }}
          AWS_RUNNER_URL: ${{ secrets.AWS_RUNNER_URL }}
          AWS_RUNNER_API_KEY: ${{ secrets.AWS_RUNNER_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          MS_OAUTH_CLIENT_ID: ${{ secrets.MS_OAUTH_CLIENT_ID }}
          MS_OAUTH_CLIENT_SECRET: ${{ secrets.MS_OAUTH_CLIENT_SECRET }}
          JDOODLE_CLIENT_ID: ${{ secrets.JDOODLE_CLIENT_ID }}
          JDOODLE_CLIENT_SECRET: ${{ secrets.JDOODLE_CLIENT_SECRET }}
          ONLINE_COMPILER_API_KEY: ${{ secrets.ONLINE_COMPILER_API_KEY }}
          RETRY_TRIGGER_SECRET: ${{ secrets.RETRY_TRIGGER_SECRET }}
          PUSH_TRIGGER_SECRET: ${{ secrets.PUSH_TRIGGER_SECRET }}
          MANAGEMENT_PAT: ${{ secrets.MANAGEMENT_PAT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          set -euo pipefail
          NAMES=(
            APP_PUBLIC_URL AWS_RUNNER_URL AWS_RUNNER_API_KEY
            EMAIL_FROM EMAIL_FROM_NAME GEMINI_API_KEY OPENAI_API_KEY
            GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET
            MS_OAUTH_CLIENT_ID MS_OAUTH_CLIENT_SECRET
            JDOODLE_CLIENT_ID JDOODLE_CLIENT_SECRET
            ONLINE_COMPILER_API_KEY RETRY_TRIGGER_SECRET PUSH_TRIGGER_SECRET
            MANAGEMENT_PAT SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASSWORD
            VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY VAPID_SUBJECT
          )
          args=()
          present=()
          for n in "${NAMES[@]}"; do
            v="${!n:-}"
            if [ -n "$v" ]; then
              args+=("$n=$v")
              present+=("$n")
            fi
          done
          if [ "${#present[@]}" -eq 0 ]; then
            echo "::warning::No hay ningun secret cargado en GitHub Secrets — nada que setear."
            exit 0
          fi
          echo "Secrets a setear (${#present[@]}): ${present[*]}"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN — no se aplica nada."
            exit 0
          fi
          supabase secrets set --project-ref "$REF" "${args[@]}"
          echo "✓ ${#present[@]} secret(s) aplicados."
