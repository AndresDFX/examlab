# Corre la suite de tests unitarios (vitest) en cada push a main y en
# cada pull request. Falla bloquea el merge.
#
# Cubre: helpers puros de src/lib + src/utils. Edge functions y E2E
# quedan para workflows separados (no en esta fase).
#
# Tiempo aprox: 1-2 min total (instalacion + 5s de tests).
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        # Acelera runs sucesivos: si bun.lock no cambio, reusa node_modules.
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Gate explícito de lockfile ANTES de instalar. Si package.json y
      # bun.lock están desincronizados, este step falla con un mensaje
      # accionable (annotation visible en la pestaña Checks del PR).
      #
      # Causa típica: un commit modificó package.json (agregó/quitó deps)
      # pero olvidó correr `bun install` y commitear el bun.lock resultante.
      #
      # Fix: en tu working tree corre `bun install` y commitea el bun.lock.
      - name: Verify bun.lock is in sync with package.json
        run: |
          set -e
          if ! bun install --frozen-lockfile --dry-run 2>/tmp/lockfile-err; then
            cat /tmp/lockfile-err
            echo "::error file=bun.lock,title=Lockfile desincronizado::package.json cambió pero bun.lock no fue actualizado. Corre 'bun install' localmente y commitea bun.lock."
            exit 1
          fi
          echo "✓ bun.lock está en sync con package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:run

      - name: Test summary
        if: ${{ always() }}
        run: |
          echo "Tests ejecutados en commit ${GITHUB_SHA::7}"
          echo "Ver detalle en el job 'Run tests' arriba."
