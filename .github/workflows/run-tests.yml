# Corre la suite de tests unitarios (vitest) + gate de coverage en
# cada push a main, cada PR, y bajo demanda (workflow_dispatch).
#
# Cubre: helpers puros de src/lib + src/utils + modulos. Edge functions
# y E2E quedan para workflows separados (no en esta fase).
#
# Tiempo aprox: 1-2 min total (instalacion + ~5s de tests + coverage).
#
# Gate de coverage: 80% (lines/functions/branches/statements). Si una
# metric cae bajo 80%, vitest exit 1 y el workflow falla → bloquea el
# merge. Configurado en vitest.config.ts:thresholds.
#
# Decisión 2026-05-26: el path filter anterior (que excluía commits
# puros de docs/SQL) se eliminó. El usuario pidió "siempre se ejecuta"
# para que el gate de coverage sea infalible — un cambio que mueva
# código sin tocar src/ (ej. mover un archivo a otra carpeta via
# refactor de YAML) DEBE pasar por el gate igual.
name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: run-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Versión FIJA (no "latest"): con "latest", setup-bun consulta
          # api.github.com/repos/oven-sh/bun/git/refs/tags para resolver el
          # último tag, y cuando la API de GitHub falla (503 transitorio) el
          # workflow completo se cae. Con una versión exacta, descarga el
          # release directamente sin tocar la tags-API → CI resiliente y
          # determinista. Bump manual cuando se quiera actualizar Bun.
          bun-version: 1.3.14

      - name: Cache dependencies
        # Acelera runs sucesivos: si bun.lock no cambio, reusa node_modules.
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Gate explícito de lockfile ANTES de instalar. Si package.json y
      # bun.lock están desincronizados, este step falla con un mensaje
      # accionable (annotation visible en la pestaña Checks del PR).
      #
      # Causa típica: un commit modificó package.json (agregó/quitó deps)
      # pero olvidó correr `bun install` y commitear el bun.lock resultante.
      #
      # Fix: en tu working tree corre `bun install` y commitea el bun.lock.
      - name: Verify bun.lock is in sync with package.json
        run: |
          set -e
          if ! bun install --frozen-lockfile --dry-run 2>/tmp/lockfile-err; then
            cat /tmp/lockfile-err
            echo "::error file=bun.lock,title=Lockfile desincronizado::package.json cambió pero bun.lock no fue actualizado. Corre 'bun install' localmente y commitea bun.lock."
            exit 1
          fi
          echo "✓ bun.lock está en sync con package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Coverage SIEMPRE corre (no es un step "opcional"). El gate
      # configurado en vitest.config.ts:thresholds está en 80% — si
      # alguna métrica (lines/functions/branches/statements) cae
      # debajo, vitest sale con exit 1 y este step falla → CI rojo.
      #
      # Esto reemplaza el `bun run test:run` plano: ya no tiene sentido
      # correr tests sin coverage porque el gate es el guardrail real.
      - name: Run tests with coverage gate (>= 80%)
        run: bun run test:coverage

      # Subimos el reporte LCOV como artifact descargable. Útil para:
      #   - Ver el reporte HTML browseable en local (descargar +
      #     abrir coverage/index.html).
      #   - Integrar con Codecov / Coveralls más adelante (ya tenemos
      #     lcov.info listo para upload-action).
      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
            coverage/index.html
            coverage/**/*.html
          retention-days: 14
          if-no-files-found: warn

      - name: Test summary
        if: ${{ always() }}
        run: |
          echo "Tests + coverage gate (≥80%) ejecutados en commit ${GITHUB_SHA::7}"
          if [ -f coverage/coverage-summary.json ]; then
            echo ""
            echo "=== Coverage summary ==="
            # Pretty-print del total — sin jq porque CI no siempre lo tiene.
            node -e '
              const j = require("./coverage/coverage-summary.json").total;
              for (const k of ["lines","statements","functions","branches"]) {
                const pct = j[k].pct;
                const status = pct >= 80 ? "✓" : "✗";
                console.log(`  ${status} ${k.padEnd(11)} ${pct.toFixed(2)}% (${j[k].covered}/${j[k].total})`);
              }
            '
          fi
          echo ""
          echo "Detalle en 'Run tests with coverage gate' arriba."
          echo "Para descargar el HTML browseable: pestaña Artifacts → coverage-report."
