name: Deploy ExamLab to AWS

# Despliegue automático en cada push a main.
# Reutiliza el bootstrap.sh y all-in-one-stack.yaml — la EC2 hace todo el trabajo.
#
# Setup requerido (una sola vez):
#   1. En GitHub: Settings → Secrets and variables → Actions → New repository secret
#   2. Crea estos secrets:
#        - AWS_ACCESS_KEY_ID         (del IAM user de GitHub Actions)
#        - AWS_SECRET_ACCESS_KEY     (del IAM user de GitHub Actions)
#        - DB_PASSWORD               (la que quieras para postgres)
#        - LOVABLE_API_KEY           (opcional, key de Google Gemini AIzaSy...)
#   3. Crea estos variables (no secrets):
#        - AWS_REGION                (ej. us-east-1)
#        - PROJECT_NAME              (ej. examlab)
#
# Para crear el IAM user con permisos correctos, ejecuta una vez en CloudShell:
#   bash lovable-aws-deployment/scripts/create-github-iam-user.sh

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'package.json'
      - 'package-lock.json'
      - 'lovable-aws-deployment/**'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch: # permite trigger manual desde la UI de GitHub

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'examlab' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve account ID and bucket names
        id: aws_ids
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          DEPLOY_BUCKET="${PROJECT_NAME}-deploy-${ACCOUNT_ID}-${AWS_REGION}"
          STORAGE_BUCKET="${PROJECT_NAME}-storage-${ACCOUNT_ID}-${AWS_REGION}"
          echo "account_id=$ACCOUNT_ID"     >> $GITHUB_OUTPUT
          echo "deploy_bucket=$DEPLOY_BUCKET"   >> $GITHUB_OUTPUT
          echo "storage_bucket=$STORAGE_BUCKET" >> $GITHUB_OUTPUT
          echo "Account: $ACCOUNT_ID"
          echo "Deploy bucket: $DEPLOY_BUCKET"
          echo "Storage bucket: $STORAGE_BUCKET"

      - name: Get latest Ubuntu 22.04 AMI
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners 099720109477 \
            --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text)
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "AMI: $AMI_ID"

      - name: Ensure SSH key pair exists
        run: |
          KEY_NAME="${PROJECT_NAME}-key"
          if ! aws ec2 describe-key-pairs --key-names "$KEY_NAME" >/dev/null 2>&1; then
            echo "Creating key pair $KEY_NAME"
            aws ec2 create-key-pair --key-name "$KEY_NAME" \
              --query 'KeyMaterial' --output text > /tmp/key.pem
            chmod 600 /tmp/key.pem
            # Guardamos solo en el runner (efímero); para uso real, sube a SSM Parameter Store
            echo "::warning::SSH key created but not persisted. Use Session Manager to access the EC2."
          else
            echo "Key pair already exists"
          fi

      - name: Ensure S3 buckets exist
        run: |
          for B in "${{ steps.aws_ids.outputs.deploy_bucket }}" "${{ steps.aws_ids.outputs.storage_bucket }}"; do
            if ! aws s3api head-bucket --bucket "$B" 2>/dev/null; then
              echo "Creating bucket $B"
              if [ "$AWS_REGION" = "us-east-1" ]; then
                aws s3api create-bucket --bucket "$B" >/dev/null
              else
                aws s3api create-bucket --bucket "$B" \
                  --create-bucket-configuration LocationConstraint="$AWS_REGION" >/dev/null
              fi
            else
              echo "Bucket $B already exists"
            fi
          done
          # Block public access on storage bucket
          aws s3api put-public-access-block \
            --bucket "${{ steps.aws_ids.outputs.storage_bucket }}" \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true" >/dev/null

      - name: Package and upload application code to S3
        id: package
        run: |
          S3_KEY="examlab-code-${{ github.sha }}.tar.gz"
          tar -czf "/tmp/$S3_KEY" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.*.local' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='lovable-aws-deployment/cloudformation' \
            --exclude='lovable-aws-deployment/scripts' \
            --exclude='lovable-aws-deployment/docs' \
            --exclude='lovable-aws-deployment/*.sh' \
            --exclude='lovable-aws-deployment/*.md' \
            --exclude='.github' \
            .
          aws s3 cp "/tmp/$S3_KEY" "s3://${{ steps.aws_ids.outputs.deploy_bucket }}/$S3_KEY"
          echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT
          echo "Uploaded: s3://${{ steps.aws_ids.outputs.deploy_bucket }}/$S3_KEY"

      - name: Upload bootstrap.sh to S3
        run: |
          aws s3 cp \
            lovable-aws-deployment/cloudformation/bootstrap.sh \
            "s3://${{ steps.aws_ids.outputs.deploy_bucket }}/bootstrap.sh"

      - name: Detect if stack exists (CREATE vs UPDATE)
        id: stack
        run: |
          STACK_NAME="${PROJECT_NAME}-stack"
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Stack exists — will UPDATE"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Stack does NOT exist — will CREATE"
          fi
          echo "name=$STACK_NAME" >> $GITHUB_OUTPUT

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file lovable-aws-deployment/cloudformation/all-in-one-stack.yaml \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --parameter-overrides \
              ProjectName="$PROJECT_NAME" \
              KeyName="${PROJECT_NAME}-key" \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              AMIId="${{ steps.ami.outputs.ami_id }}" \
              S3Bucket="${{ steps.aws_ids.outputs.deploy_bucket }}" \
              S3Key="${{ steps.package.outputs.s3_key }}" \
              LovableApiKey="${{ secrets.LOVABLE_API_KEY }}" \
              StorageBucketName="${{ steps.aws_ids.outputs.storage_bucket }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: outputs
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          PUBLIC_IP=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicIP`].OutputValue' \
            --output text)
          ELASTIC_IP=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.stack.outputs.name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ElasticIP`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "elastic_ip=$ELASTIC_IP" >> $GITHUB_OUTPUT

      - name: Apply live-update on existing stack (no EC2 recreation)
        if: steps.stack.outputs.exists == 'true'
        run: |
          # Build the live-update script
          cat > /tmp/live-update.sh <<LIVEEOF
          #!/bin/bash
          set -e
          echo "=== Live update started: \$(date) ==="

          aws s3 cp "s3://${{ steps.aws_ids.outputs.deploy_bucket }}/${{ steps.package.outputs.s3_key }}" /tmp/code.tar.gz --region "${{ env.AWS_REGION }}"
          rm -rf /opt/examlab.bak
          cp -a /opt/examlab /opt/examlab.bak
          tar -xzf /tmp/code.tar.gz -C /opt/examlab --overwrite
          rm /tmp/code.tar.gz
          chown -R ubuntu:ubuntu /opt/examlab

          # Refresh edge functions + URL substitution + AI fallback wrapper
          if [ -d /opt/examlab/supabase/functions ]; then
            for fn_dir in /opt/examlab/supabase/functions/*/; do
              [ -d "\$fn_dir" ] || continue
              fn_name=\$(basename "\$fn_dir")
              rm -rf "/opt/supabase/volumes/functions/\$fn_name"
              cp -r "\$fn_dir" "/opt/supabase/volumes/functions/\$fn_name"
            done
            find /opt/supabase/volumes/functions -name "*.ts" -exec \
              sed -i \
                -e 's|https://ai.gateway.lovable.dev/v1/chat/completions|https://generativelanguage.googleapis.com/v1beta/openai/chat/completions|g' \
                -e 's|"google/gemini-|"gemini-|g' \
                {} \;

            cat > /tmp/wrapper.ts <<'WEOF'
          // === [auto-injected by deploy] AI fallback wrapper ===
          const _AI_ORIG_FETCH = globalThis.fetch;
          const _AI_FALLBACK_MODELS = ["gemini-2.0-flash", "gemini-2.0-flash-lite", "gemini-1.5-flash", "gemini-1.5-flash-8b"];
          // deno-lint-ignore no-explicit-any
          globalThis.fetch = async function _aiFetch(input: any, init?: any): Promise<Response> {
            const url = typeof input === "string" ? input : (input?.url ?? String(input));
            if (!url.includes("generativelanguage.googleapis.com") || !init?.body) return _AI_ORIG_FETCH(input, init);
            let body: { model?: string; [k: string]: unknown };
            try { body = JSON.parse(init.body as string); } catch { return _AI_ORIG_FETCH(input, init); }
            const original = body.model;
            const tries: string[] = [];
            if (original) tries.push(original);
            for (const m of _AI_FALLBACK_MODELS) if (!tries.includes(m)) tries.push(m);
            let lastResp: Response | null = null;
            for (const model of tries) {
              body.model = model;
              const response = await _AI_ORIG_FETCH(input, { ...init, body: JSON.stringify(body) });
              if (response.ok) return response;
              if (response.status === 429 || response.status === 503) { lastResp = response.clone(); continue; }
              return response;
            }
            return lastResp ?? _AI_ORIG_FETCH(input, init);
          };
          // === [end auto-injected] ===
          WEOF
            for fn_file in /opt/supabase/volumes/functions/*/index.ts; do
              [ -f "\$fn_file" ] || continue
              if grep -q "generativelanguage.googleapis.com" "\$fn_file" && ! grep -q "auto-injected by deploy" "\$fn_file"; then
                tmp=\$(mktemp)
                cat /tmp/wrapper.ts "\$fn_file" > "\$tmp"
                mv "\$tmp" "\$fn_file"
              fi
            done
            rm -f /tmp/wrapper.ts
          fi

          # Update LOVABLE_API_KEY in Supabase .env
          LOVABLE_KEY="${{ secrets.LOVABLE_API_KEY }}"
          if [ -n "\$LOVABLE_KEY" ]; then
            if grep -q "^LOVABLE_API_KEY=" /opt/supabase/.env; then
              sed -i "s|^LOVABLE_API_KEY=.*|LOVABLE_API_KEY=\$LOVABLE_KEY|" /opt/supabase/.env
            else
              echo "LOVABLE_API_KEY=\$LOVABLE_KEY" >> /opt/supabase/.env
            fi
          fi

          # Restart functions container
          cd /opt/supabase
          docker compose up -d --force-recreate functions

          # Reinstall npm deps if package.json changed
          if ! cmp -s /opt/examlab/package.json /opt/examlab.bak/package.json 2>/dev/null; then
            sudo -u ubuntu bash -c "cd /opt/examlab && npm install --legacy-peer-deps --no-audit --no-fund"
          fi
          systemctl restart examlab.service

          echo "=== Live update completed: \$(date) ==="
          LIVEEOF

          # Upload script and execute via SSM
          SCRIPT_KEY="live-update-${{ github.sha }}.sh"
          aws s3 cp /tmp/live-update.sh "s3://${{ steps.aws_ids.outputs.deploy_bucket }}/$SCRIPT_KEY"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"aws s3 cp s3://${{ steps.aws_ids.outputs.deploy_bucket }}/$SCRIPT_KEY /tmp/u.sh --region ${{ env.AWS_REGION }}\",\"chmod +x /tmp/u.sh\",\"sudo /tmp/u.sh 2>&1 | tee /var/log/live-update.log\",\"rm -f /tmp/u.sh\"]" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command ID: $CMD_ID"

          # Wait for completion (up to 10 min)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ steps.outputs.instance_id }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "InProgress")
            case "$STATUS" in
              Success)
                echo "✅ Live update completed successfully"
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "❌ Live update failed: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" \
                  --instance-id "${{ steps.outputs.instance_id }}" \
                  --query 'StandardErrorContent' \
                  --output text | head -50
                exit 1 ;;
            esac
            sleep 10
          done
          echo "⚠️ Timeout waiting for live update"

      - name: Print deployment summary
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  ✅ ExamLab deployed to AWS"
          echo "═══════════════════════════════════════════════════════════"
          echo "  App URL:        http://${{ steps.outputs.elastic_ip }}:3000"
          echo "  Supabase API:   http://${{ steps.outputs.elastic_ip }}:8000"
          echo "  Instance ID:    ${{ steps.outputs.instance_id }}"
          echo "  Stack:          ${{ steps.stack.outputs.name }}"
          echo "  Region:         ${{ env.AWS_REGION }}"
          echo "═══════════════════════════════════════════════════════════"
          if [ "${{ steps.stack.outputs.exists }}" = "false" ]; then
            echo "  Note: First deploy — wait ~10 minutes for the EC2 to finish"
            echo "        installing software (Node, Docker, Supabase, npm install)."
          else
            echo "  Note: Live update applied — changes should be live in ~30s."
          fi
          echo "═══════════════════════════════════════════════════════════"
