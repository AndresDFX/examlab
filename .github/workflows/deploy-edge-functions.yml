# Despliega las edge functions de Supabase al proyecto configurado en
# los GitHub Secrets (SUPABASE_PROJECT_REF + SUPABASE_ACCESS_TOKEN).
#
# Por que este workflow:
#   Antes Lovable Cloud desplegaba las edge functions automaticamente al
#   hacer "Publish". Despues de migrar a un Supabase propio, Lovable
#   solo despliega el frontend — las edge functions las debe desplegar
#   este pipeline en cada push a main.
#
# Que hace en cada run:
#   1. Genera un supabase/config.toml minimo en runtime (porque el del
#      repo tiene claves de versiones viejas del CLI que la latest
#      rechaza con errores tipo "'realtime' has invalid keys: ...").
#   2. Itera supabase/functions/* saltando carpetas auxiliares (_shared)
#      y despliega cada funcion. Deploy es idempotente: crea si no
#      existe, actualiza si ya existe.
#   3. (Opcional) Si activas el input `prune_orphaned`, lista las
#      funciones del proyecto remoto y borra las que NO existen en el
#      repo local. Util cuando borras una funcion del codigo y quieres
#      que desaparezca tambien del servidor.
#
# Secrets requeridos en GitHub (Settings -> Secrets -> Actions):
#   - SUPABASE_PROJECT_REF: ref del proyecto Supabase destino.
#   - SUPABASE_ACCESS_TOKEN: personal token (sbp_...) desde
#     https://supabase.com/dashboard/account/tokens
#
# Cuando se dispara:
#   - Push a main (automatico): SOLO deploy/update (sin pruning).
#   - workflow_dispatch (manual): permite activar pruning.
name: Deploy Edge Functions

on:
  push:
    # En CADA push a main desplegamos todas las funciones — no usamos
    # filtro `paths` a proposito. El deploy es idempotente y preferimos
    # "siempre desplegar todo" que filtros que se pueden saltar cambios
    # en `_shared` u otros archivos no detectados.
    branches: [main]

  workflow_dispatch:
    inputs:
      prune_orphaned:
        description: 'Borrar funciones del proyecto remoto que ya no existen en el repo'
        required: true
        type: boolean
        default: false

# Cancelamos runs anteriores en curso si llega un push nuevo a main.
concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validar secrets
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${REF}" ]; then
            echo "::error::SUPABASE_PROJECT_REF no esta configurado."
            exit 1
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN no esta configurado."
            exit 1
          fi

      - name: Preparar config.toml minimo
        # El supabase/config.toml del repo tiene claves de una version
        # vieja del CLI que la actual rechaza. Lo bypaseamos armando un
        # dir temporal con un config minimo y un symlink a las funciones.
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p /tmp/sb-deploy/supabase
          ln -sfn "$GITHUB_WORKSPACE/supabase/functions" /tmp/sb-deploy/supabase/functions
          cat > /tmp/sb-deploy/supabase/config.toml <<EOF
          project_id = "${REF}"

          [functions.calendar-oauth-callback]
          verify_jwt = false

          [functions.send-push]
          verify_jwt = false
          EOF
          echo "config.toml minimo generado en /tmp/sb-deploy"

      - name: Deploy / update functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        working-directory: /tmp/sb-deploy
        run: |
          set -euo pipefail
          deployed=0
          failed=0
          failed_names=()
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            # Saltar carpetas auxiliares (modulos compartidos, no funciones).
            case "$name" in _*) echo "Skipping helper: $name"; continue;; esac
            echo ""
            echo "═══ Deploying: $name ═══"
            if supabase functions deploy "$name" --project-ref "$REF"; then
              deployed=$((deployed + 1))
            else
              failed=$((failed + 1))
              failed_names+=("$name")
              echo "::warning::Deploy de $name fallo — seguimos con los demas."
            fi
          done
          echo ""
          echo "═══ Resumen deploy: $deployed OK, $failed fallidas ═══"
          if [ "$failed" -gt 0 ]; then
            echo "Funciones que fallaron: ${failed_names[*]}"
            exit 1
          fi

      - name: Prune orphaned functions
        # Solo corre cuando se dispara manualmente con prune_orphaned=true.
        # Compara la lista de funciones del proyecto remoto contra las
        # subcarpetas de supabase/functions/ (excluyendo _*) y borra las
        # del remoto que ya no existen localmente.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.prune_orphaned }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        working-directory: /tmp/sb-deploy
        run: |
          set -euo pipefail
          echo "═══ Buscando funciones huerfanas en el proyecto remoto ═══"

          # Lista de funciones locales (carpetas no-helper).
          local_fns=()
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in _*) continue;; esac
            local_fns+=("$name")
          done
          echo "Funciones locales: ${local_fns[*]}"

          # Lista de funciones remotas via CLI. El output del `functions
          # list` viene como tabla — extraemos la columna NAME.
          remote_raw=$(supabase functions list --project-ref "$REF" 2>&1 || true)
          remote_fns=()
          while IFS= read -r line; do
            name=$(echo "$line" | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); print $3}')
            if [ -n "$name" ] && [ "$name" != "NAME" ] && [[ "$name" != *"-"* || "$name" != *"--"* ]]; then
              # Filtra header y bordes de tabla (lineas con solo guiones).
              if [[ "$name" =~ ^[a-z0-9_-]+$ ]]; then
                remote_fns+=("$name")
              fi
            fi
          done <<< "$remote_raw"
          echo "Funciones remotas: ${remote_fns[*]:-<ninguna detectada>}"

          # Calcular diff: remotas que NO estan en locales.
          deleted=0
          failed_deletes=0
          for r in "${remote_fns[@]}"; do
            found=0
            for l in "${local_fns[@]}"; do
              if [ "$r" = "$l" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              echo "Borrando huerfana: $r"
              if supabase functions delete "$r" --project-ref "$REF"; then
                deleted=$((deleted + 1))
              else
                failed_deletes=$((failed_deletes + 1))
                echo "::warning::No pude borrar $r — sigue."
              fi
            fi
          done
          echo "═══ Prune terminado: $deleted borradas, $failed_deletes fallidas ═══"
