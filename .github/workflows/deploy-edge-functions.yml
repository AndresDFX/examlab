# Despliega las edge functions de Supabase al proyecto configurado en
# los GitHub Secrets (SUPABASE_PROJECT_REF + SUPABASE_ACCESS_TOKEN).
#
# Por que este workflow:
#   Antes Lovable Cloud desplegaba las edge functions automaticamente al
#   hacer "Publish". Despues de migrar a un Supabase propio, Lovable
#   solo despliega el frontend — las edge functions las debe desplegar
#   este pipeline.
#
# Optimizaciones de costo / rate-limit (2026-05-30):
#   1) `paths` filter: el workflow SOLO corre cuando hay cambios reales
#      en supabase/functions/** o en este propio archivo. Antes corria
#      en CADA push, gastaba minutos de Actions y saturaba el rate limit
#      de la API de GitHub (que supabase/setup-cli usa para resolver
#      "latest"), causando errores tipo:
#         "Failed to resolve latest Supabase CLI release: rate limit exceeded"
#   2) GITHUB_TOKEN al setup-cli: aunque el filtro de paths reduce
#      invocaciones, cuando si corre necesita autenticarse a la API de
#      releases. Con GITHUB_TOKEN el limite sube de 60/h a 1000/h por
#      repo.
#   3) Deploy incremental: solo despliega las funciones cuyas carpetas
#      cambiaron en el push. Excepciones que fuerzan deploy total:
#       - cambios en `_shared` (modulos importados por todas las fns)
#       - cambios en el propio workflow
#       - workflow_dispatch con `force_all=true`
#
# Que hace en cada run:
#   1. Detecta funciones modificadas (git diff contra commit anterior).
#   2. Genera un supabase/config.toml minimo en runtime (porque el del
#      repo tiene claves de versiones viejas del CLI que la latest
#      rechaza con errores tipo "'realtime' has invalid keys: ...").
#   3. Despliega solo las funciones cambiadas. Deploy es idempotente:
#      crea si no existe, actualiza si ya existe.
#   4. (Opcional) Si activas el input `prune_orphaned`, lista las
#      funciones del proyecto remoto y borra las que NO existen en el
#      repo local.
#
# Secrets requeridos en GitHub (Settings -> Secrets -> Actions):
#   - SUPABASE_PROJECT_REF: ref del proyecto Supabase destino.
#   - SUPABASE_ACCESS_TOKEN: personal token (sbp_...) desde
#     https://supabase.com/dashboard/account/tokens
#
# Cuando se dispara:
#   - Push a main + cambios en supabase/functions/** -> deploy incremental.
#   - workflow_dispatch (manual): permite pruning y/o forzar deploy total.
name: Deploy Edge Functions

on:
  push:
    branches: [main]
    # Solo corre cuando cambia algo en edge functions. Cambios en
    # frontend / migraciones / docs NO disparan este workflow.
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

  workflow_dispatch:
    inputs:
      prune_orphaned:
        description: 'Borrar funciones del proyecto remoto que ya no existen en el repo'
        required: true
        type: boolean
        default: false
      force_all:
        description: 'Forzar deploy de TODAS las funciones (ignorar diff)'
        required: false
        type: boolean
        default: false

# Cancelamos runs anteriores en curso si llega un push nuevo a main.
concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesitamos al menos el commit anterior para `git diff` y
          # detectar qué funciones cambiaron. fetch-depth: 0 trae todo el
          # historial — para repos chicos es OK; si crece mucho, podemos
          # bajar a fetch-depth: 2 (commit actual + previo).
          fetch-depth: 2

      - name: Validar secrets
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${REF}" ]; then
            echo "::error::SUPABASE_PROJECT_REF no esta configurado."
            exit 1
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN no esta configurado."
            exit 1
          fi

      - name: Detectar funciones a desplegar
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_ALL: ${{ inputs.force_all }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Lista de TODAS las funciones locales (carpetas no-helper).
          all_fns=()
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in _*) continue;; esac
            all_fns+=("$name")
          done

          # Modo "todo" — cuando se dispara manualmente con force_all,
          # cuando no hay commit previo (primer push), o cuando cambian
          # archivos en _shared o el propio workflow (ambos afectan a
          # todas las funciones).
          deploy_mode="incremental"
          targets=()

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$FORCE_ALL" = "true" ]; then
            echo "Force-all manual: desplegando todas."
            deploy_mode="all"
          elif [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No hay commit previo (primer push o force-push): desplegando todas."
            deploy_mode="all"
          else
            # Diff entre BEFORE_SHA y HEAD. Filtramos solo paths bajo
            # supabase/functions/ y el workflow propio.
            changed_files=$(git diff --name-only "$BEFORE_SHA" HEAD -- \
              'supabase/functions/' \
              '.github/workflows/deploy-edge-functions.yml' || echo "")

            if [ -z "$changed_files" ]; then
              echo "Sin cambios detectados — nada que desplegar."
              echo "deploy_mode=skip" >> "$GITHUB_OUTPUT"
              echo "targets=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Si el workflow propio cambio o algo en _shared cambio,
            # forzamos deploy de todas (las _shared se importan dinamicamente).
            if echo "$changed_files" | grep -qE '^(\.github/workflows/deploy-edge-functions\.yml|supabase/functions/_)'; then
              echo "Cambios en workflow o en _shared — desplegando todas:"
              echo "$changed_files" | grep -E '^(\.github|supabase/functions/_)' || true
              deploy_mode="all"
            else
              # Extraer nombres unicos de funciones tocadas
              # (path: supabase/functions/<name>/...).
              changed_fns=$(echo "$changed_files" \
                | grep -oE '^supabase/functions/[^/]+' \
                | sed 's|^supabase/functions/||' \
                | sort -u)
              for n in $changed_fns; do
                # Excluir _shared y carpetas que ya no existen (deleted).
                case "$n" in _*) continue;; esac
                if [ -d "supabase/functions/$n" ]; then
                  targets+=("$n")
                fi
              done
            fi
          fi

          if [ "$deploy_mode" = "all" ]; then
            targets=("${all_fns[@]}")
          fi

          if [ "${#targets[@]}" -eq 0 ]; then
            echo "No quedaron funciones para desplegar (posible borrado puro)."
            echo "deploy_mode=skip" >> "$GITHUB_OUTPUT"
            echo "targets=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Modo: $deploy_mode"
          echo "Funciones a desplegar (${#targets[@]}): ${targets[*]}"
          echo "deploy_mode=$deploy_mode" >> "$GITHUB_OUTPUT"
          # Pasamos como string separado por espacios (parseable abajo).
          echo "targets=${targets[*]}" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        # Skip CLI setup si no hay nada que desplegar (evita hit a la API
        # de GitHub releases — la causa del rate-limit anterior).
        if: steps.detect.outputs.deploy_mode != 'skip'
        uses: supabase/setup-cli@v1
        env:
          # Autenticar contra la API de releases sube el limite de
          # 60 req/h a 1000 req/h. Sin esto, el "latest" lookup se
          # quemaba el limite y rompia el deploy.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest

      - name: Preparar config.toml minimo
        if: steps.detect.outputs.deploy_mode != 'skip'
        # El supabase/config.toml del repo tiene claves de una version
        # vieja del CLI que la actual rechaza. Lo bypaseamos armando un
        # dir temporal con un config minimo y un symlink a las funciones.
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p /tmp/sb-deploy/supabase
          ln -sfn "$GITHUB_WORKSPACE/supabase/functions" /tmp/sb-deploy/supabase/functions
          cat > /tmp/sb-deploy/supabase/config.toml <<EOF
          project_id = "${REF}"

          [functions.calendar-oauth-callback]
          verify_jwt = false

          [functions.send-push]
          verify_jwt = false
          EOF
          echo "config.toml minimo generado en /tmp/sb-deploy"

      - name: Deploy / update functions
        if: steps.detect.outputs.deploy_mode != 'skip'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TARGETS: ${{ steps.detect.outputs.targets }}
        working-directory: /tmp/sb-deploy
        run: |
          set -euo pipefail
          deployed=0
          failed=0
          failed_names=()
          # TARGETS viene como string separado por espacios desde detect.
          read -ra fns <<< "$TARGETS"
          echo "Desplegando ${#fns[@]} funcion(es): ${fns[*]}"
          for name in "${fns[@]}"; do
            [ -z "$name" ] && continue
            echo ""
            echo "═══ Deploying: $name ═══"
            if supabase functions deploy "$name" --project-ref "$REF"; then
              deployed=$((deployed + 1))
            else
              failed=$((failed + 1))
              failed_names+=("$name")
              echo "::warning::Deploy de $name fallo — seguimos con los demas."
            fi
          done
          echo ""
          echo "═══ Resumen deploy: $deployed OK, $failed fallidas ═══"
          if [ "$failed" -gt 0 ]; then
            echo "Funciones que fallaron: ${failed_names[*]}"
            exit 1
          fi

      - name: Sin cambios — saltando deploy
        if: steps.detect.outputs.deploy_mode == 'skip'
        run: echo "No hay funciones modificadas. Workflow terminado sin deploys."

      - name: Prune orphaned functions
        # Solo corre cuando se dispara manualmente con prune_orphaned=true.
        # Compara la lista de funciones del proyecto remoto contra las
        # subcarpetas de supabase/functions/ (excluyendo _*) y borra las
        # del remoto que ya no existen localmente.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.prune_orphaned }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        working-directory: /tmp/sb-deploy
        run: |
          set -euo pipefail
          echo "═══ Buscando funciones huerfanas en el proyecto remoto ═══"

          # Lista de funciones locales (carpetas no-helper).
          local_fns=()
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in _*) continue;; esac
            local_fns+=("$name")
          done
          echo "Funciones locales: ${local_fns[*]}"

          # Lista de funciones remotas via CLI. El output del `functions
          # list` viene como tabla — extraemos la columna NAME.
          remote_raw=$(supabase functions list --project-ref "$REF" 2>&1 || true)
          remote_fns=()
          while IFS= read -r line; do
            name=$(echo "$line" | awk -F'|' '{gsub(/^[ \t]+|[ \t]+$/, "", $3); print $3}')
            if [ -n "$name" ] && [ "$name" != "NAME" ] && [[ "$name" != *"-"* || "$name" != *"--"* ]]; then
              # Filtra header y bordes de tabla (lineas con solo guiones).
              if [[ "$name" =~ ^[a-z0-9_-]+$ ]]; then
                remote_fns+=("$name")
              fi
            fi
          done <<< "$remote_raw"
          echo "Funciones remotas: ${remote_fns[*]:-<ninguna detectada>}"

          # Calcular diff: remotas que NO estan en locales.
          deleted=0
          failed_deletes=0
          for r in "${remote_fns[@]}"; do
            found=0
            for l in "${local_fns[@]}"; do
              if [ "$r" = "$l" ]; then found=1; break; fi
            done
            if [ "$found" -eq 0 ]; then
              echo "Borrando huerfana: $r"
              if supabase functions delete "$r" --project-ref "$REF"; then
                deleted=$((deleted + 1))
              else
                failed_deletes=$((failed_deletes + 1))
                echo "::warning::No pude borrar $r — sigue."
              fi
            fi
          done
          echo "═══ Prune terminado: $deleted borradas, $failed_deletes fallidas ═══"
