AWSTemplateFormatVersion: '2010-09-09'

Description: EC2 Stack - Application Load Balancer, Auto Scaling Group, EC2 instances

Parameters:
  ProjectName:
    Type: String
    Default: examlab

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type

  MinSize:
    Type: Number
    Default: 1
    Description: Minimum number of instances

  MaxSize:
    Type: Number
    Default: 2
    Description: Maximum number of instances

  DesiredCapacity:
    Type: Number
    Default: 1
    Description: Initial number of instances

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access

  AppPort:
    Type: Number
    Default: 3000
    Description: Application port

  GitHubRepo:
    Type: String
    Default: ''
    Description: GitHub repository URL (optional)

  GitHubBranch:
    Type: String
    Default: main
    Description: GitHub branch to deploy

  NodeVersion:
    Type: String
    Default: '20'
    Description: Node.js version

  EnableAutoScaling:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']

Resources:
  # ═══════════════════════════════════════════════════════════════════════════
  # Security Group para EC2
  # ═══════════════════════════════════════════════════════════════════════════

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-ec2-sg-${Environment}'
      GroupDescription: Security group for EC2 instances
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPC-${Environment}'
      SecurityGroupIngress:
        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
        # Application port desde ALB
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId
          Description: App traffic from ALB
        # HTTP para health check
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId
          Description: HTTP from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-sg-${Environment}'

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Group para ALB
  # ═══════════════════════════════════════════════════════════════════════════

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-alb-sg-${Environment}'
      GroupDescription: Security group for Application Load Balancer
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPC-${Environment}'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg-${Environment}'

  # ═══════════════════════════════════════════════════════════════════════════
  # IAM Role para EC2
  # ═══════════════════════════════════════════════════════════════════════════

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ec2-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-role-${Environment}'

  # CloudWatch Logs policy
  CloudWatchLogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudWatchLogs
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
            Resource:
              - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/examlab/*'
      Roles:
        - !Ref EC2Role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ═══════════════════════════════════════════════════════════════════════════
  # Application Load Balancer
  # ═══════════════════════════════════════════════════════════════════════════

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb-${Environment}'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub '${ProjectName}-PublicSubnet1-${Environment}'
        - Fn::ImportValue: !Sub '${ProjectName}-PublicSubnet2-${Environment}'
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-${Environment}'

  # ═══════════════════════════════════════════════════════════════════════════
  # Target Group
  # ═══════════════════════════════════════════════════════════════════════════

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg-${Environment}'
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPC-${Environment}'
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckPort: '80'
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200,301,302'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
        - Key: stickiness.enabled
          Value: 'false'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tg-${Environment}'

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTP Listener
  # ═══════════════════════════════════════════════════════════════════════════

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !GetAtt TargetGroup.TargetGroupArn

  # ═══════════════════════════════════════════════════════════════════════════
  # Launch Template
  # ═══════════════════════════════════════════════════════════════════════════

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${ProjectName}-lt-${Environment}'
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            # Variables
            APP_DIR="/opt/examlab"
            LOG_DIR="/var/log/examlab"
            GITHUB_REPO="${GitHubRepo}"
            GITHUB_BRANCH="${GitHubBranch}"
            APP_PORT="${AppPort}"
            NODE_VERSION="${NodeVersion}"

            # Setup
            mkdir -p "$LOG_DIR"
            exec > >(tee -a "$LOG_DIR/init.log")
            exec 2>&1

            echo "=== Iniciando setup de ExamLab ==="
            yum update -y
            yum install -y curl wget git htop nodejs npm

            # Install Node.js LTS
            curl -fsSL https://rpm.nodesource.com/setup_${NodeVersion}.x | bash - || true
            yum install -y nodejs

            echo "Node.js $(node -v) instalado"
            echo "npm $(npm -v) instalado"

            # Install Nginx
            amazon-linux-extras install -y nginx1
            systemctl enable nginx
            systemctl start nginx

            # Create app directory
            mkdir -p "$APP_DIR"
            chown -R ec2-user:ec2-user "$APP_DIR"
            chown -R ec2-user:ec2-user "$LOG_DIR"

            # Clone repository if provided
            if [ -n "$GITHUB_REPO" ]; then
              echo "Clonando repositorio..."
              cd "$APP_DIR"
              sudo -u ec2-user git clone -b "$GITHUB_BRANCH" "$GITHUB_REPO" . || echo "Clone falló"
            fi

            # Configure Nginx
            cat > /etc/nginx/conf.d/examlab.conf << 'NGINX'
            upstream app {
              server 127.0.0.1:${AppPort};
            }

            server {
              listen 80 default_server;
              server_name _;
              client_max_body_size 50M;

              location /health {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
              }

              location / {
                proxy_pass http://app;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_buffering off;
              }

              gzip on;
              gzip_vary on;
              gzip_comp_level 6;
              gzip_types text/plain text/css text/javascript application/json;
            }
            NGINX

            nginx -t && systemctl reload nginx
            echo "Nginx configurado"

            # Install dependencies if package.json exists
            if [ -f "$APP_DIR/package.json" ]; then
              echo "Instalando dependencias npm..."
              cd "$APP_DIR"
              sudo -u ec2-user npm ci --omit=dev || echo "npm install tuvo problemas"
            fi

            echo "=== Setup completado ===" >> "$LOG_DIR/init.log"
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-instance-${Environment}'
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-volume-${Environment}'

  # ═══════════════════════════════════════════════════════════════════════════
  # Auto Scaling Group
  # ═══════════════════════════════════════════════════════════════════════════

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub '${ProjectName}-asg-${Environment}'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub '${ProjectName}-PublicSubnet1-${Environment}'
        - Fn::ImportValue: !Sub '${ProjectName}-PublicSubnet2-${Environment}'
      TargetGroupARNs:
        - !GetAtt TargetGroup.TargetGroupArn
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-asg-${Environment}'
          PropagateAtLaunch: true

  # ═══════════════════════════════════════════════════════════════════════════
  # Scaling Policies
  # ═══════════════════════════════════════════════════════════════════════════

  ScaleUpPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Condition: EnableAutoScalingCondition
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AutoScalingGroup
      Cooldown: 300
      ScalingAdjustment: 1

  ScaleDownPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Condition: EnableAutoScalingCondition
    Properties:
      AdjustmentType: ChangeInCapacity
      AutoScalingGroupName: !Ref AutoScalingGroup
      Cooldown: 300
      ScalingAdjustment: -1

  CPUAlarmHigh:
    Type: AWS::CloudWatch::Alarm
    Condition: EnableAutoScalingCondition
    Properties:
      AlarmName: !Sub '${ProjectName}-cpu-high-${Environment}'
      AlarmDescription: Trigger scale up if CPU > 75%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 75
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      AlarmActions:
        - !Ref ScaleUpPolicy

  CPUAlarmLow:
    Type: AWS::CloudWatch::Alarm
    Condition: EnableAutoScalingCondition
    Properties:
      AlarmName: !Sub '${ProjectName}-cpu-low-${Environment}'
      AlarmDescription: Trigger scale down if CPU < 25%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 25
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      AlarmActions:
        - !Ref ScaleDownPolicy

Conditions:
  EnableAutoScalingCondition: !Equals [!Ref EnableAutoScaling, 'true']

Outputs:
  ALBDNSName:
    Description: ALB DNS Name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-ALB-DNS-${Environment}'

  ALBArn:
    Description: ALB ARN
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerArn
    Export:
      Name: !Sub '${ProjectName}-ALB-ARN-${Environment}'

  TargetGroupArn:
    Description: Target Group ARN
    Value: !GetAtt TargetGroup.TargetGroupArn
    Export:
      Name: !Sub '${ProjectName}-TG-ARN-${Environment}'

  ASGName:
    Description: Auto Scaling Group Name
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub '${ProjectName}-ASG-${Environment}'

  EC2SecurityGroupId:
    Description: EC2 Security Group ID
    Value: !GetAtt EC2SecurityGroup.GroupId
    Export:
      Name: !Sub '${ProjectName}-EC2-SG-${Environment}'

  ApplicationURL:
    Description: Application URL
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'
