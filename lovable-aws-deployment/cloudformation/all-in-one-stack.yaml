AWSTemplateFormatVersion: '2010-09-09'
Description: 'ExamLab - All-in-One: VPC + EC2 + Supabase + Storage'

Parameters:
  ProjectName:
    Type: String
    Default: lovable-app

  KeyName:
    Type: String
    Description: EC2 Key Pair name

  DBPassword:
    Type: String
    NoEcho: true
    Description: Database password

  AMIId:
    Type: String
    Description: AMI ID (Ubuntu 22.04 LTS)

  S3Bucket:
    Type: String
    Description: S3 bucket containing the application code

  S3Key:
    Type: String
    Description: S3 key for the application tar.gz

  S3BootstrapKey:
    Type: String
    Default: bootstrap.sh
    Description: S3 key for the bootstrap script

  LovableApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: AI Gateway API key (OpenRouter or Lovable). Optional, leave empty to disable AI.

  StorageBucketName:
    Type: String
    Default: ''
    Description: S3 bucket for Supabase Storage (file uploads). Created by deploy.sh.

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-subnet-public'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rt-public'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-sg'
      GroupDescription: ExamLab security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (also used by EC2 Instance Connect)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
          Description: ExamLab App
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: Supabase Kong API
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-sg'

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ec2/${ProjectName}'
      RetentionInDays: 7

  LogStream:
    Type: AWS::Logs::LogStream
    Properties:
      LogGroupName: !Ref LogGroup
      LogStreamName: deployment

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/ec2/*'
        - PolicyName: S3CodeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${S3Bucket}'
        - PolicyName: S3StorageBackend
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObjectAcl
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${StorageBucketName}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub 'arn:aws:s3:::${StorageBucketName}'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      InstanceId: !Ref EC2Instance
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-eip'

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AMIId
      InstanceType: t3.medium
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      # Hop limit 2 lets Docker containers (Supabase Storage) reach IMDSv2
      # to fetch IAM role credentials for S3 access
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
        HttpPutResponseHopLimit: 2
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          exec > >(tee /var/log/user-data.log) 2>&1
          echo "=== Bootstrap downloader: $(date) ==="
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          apt-get install -y curl unzip
          if ! command -v aws &>/dev/null; then
            curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
            unzip -q /tmp/awscli.zip -d /tmp
            /tmp/aws/install
          fi
          aws s3 cp "s3://${S3Bucket}/${S3BootstrapKey}" /tmp/bootstrap.sh --region ${AWS::Region}
          chmod +x /tmp/bootstrap.sh
          export PROJECT_NAME="${ProjectName}"
          export S3_BUCKET="${S3Bucket}"
          export S3_KEY="${S3Key}"
          export AWS_REGION="${AWS::Region}"
          export LOVABLE_API_KEY="${LovableApiKey}"
          export STORAGE_BUCKET="${StorageBucketName}"
          /tmp/bootstrap.sh
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-instance'

Outputs:
  InstanceId:
    Value: !Ref EC2Instance
    Description: EC2 Instance ID

  ElasticIP:
    Value: !Ref ElasticIP
    Description: Elastic IP address (fixed)

  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
    Description: Public IP address

  PublicDNS:
    Value: !GetAtt EC2Instance.PublicDnsName
    Description: Public DNS name

  AppURL:
    Value: !Sub 'http://${ElasticIP}:3000'
    Description: Application URL (using Elastic IP)

  AppURLPublicIP:
    Value: !Sub 'http://${EC2Instance.PublicIp}:3000'
    Description: Application URL (using Public IP)

  SSHCommand:
    Value: !Sub 'ssh -i /path/to/key.pem ubuntu@${ElasticIP}'
    Description: SSH command (using Elastic IP)

  SessionManagerCommand:
    Value: !Sub 'aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}'
    Description: Connect via Session Manager (no SSH key needed)

  LogGroup:
    Value: !Ref LogGroup
    Description: CloudWatch Log Group

  CloudWatchLogs:
    Value: !Sub 'https://console.aws.amazon.com/logs/home?region=${AWS::Region}#logStream:group=/aws/ec2/${ProjectName}'
    Description: CloudWatch Logs URL
