name: Deploy to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-aws.yml'
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      # 1️⃣ Checkout código
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configurar AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3️⃣ Verificar credenciales AWS
      - name: Verify AWS credentials
        run: |
          echo "✓ AWS credentials configured"
          aws sts get-caller-identity
          echo "Account: $(aws sts get-caller-identity --query Account --output text)"
          echo "User: $(aws sts get-caller-identity --query Arn --output text)"

      # 4️⃣ Preparar ambiente
      - name: Setup deployment environment
        run: |
          cd lovable-aws-deployment

          # Verificar variables requeridas
          echo "✓ Checking required secrets..."
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "❌ DB_PASSWORD not configured"
            exit 1
          fi
          echo "✓ All secrets validated"

          # Listar archivos CloudFormation
          echo "✓ CloudFormation templates:"
          ls -lh cloudformation/*.yaml

          # Verificar scripts
          echo "✓ Deployment scripts:"
          ls -lh scripts/ | grep -E "\.sh$|^total"

      # 5️⃣ Crear/actualizar variables de despliegue
      - name: Generate deployment variables
        run: |
          cd lovable-aws-deployment

          # Generar variables desde secrets y defaults
          cat > deploy-vars.env << 'EOF'
          #!/bin/bash

          # Valores por defecto (pueden ser sobrescritos por secrets)
          PROJECT_NAME="${{ secrets.PROJECT_NAME || 'examlab' }}"
          ENVIRONMENT="${{ secrets.ENVIRONMENT || 'production' }}"
          AWS_REGION="us-east-1"
          OWNER_NAME="${{ secrets.OWNER_NAME || 'GitHub Actions' }}"
          COST_CENTER="${{ secrets.COST_CENTER || 'engineering' }}"

          # GitHub config
          GITHUB_OWNER="${{ github.repository_owner }}"
          GITHUB_REPO="${{ github.event.repository.name }}"
          GITHUB_BRANCH="${{ github.ref_name }}"

          # Infraestructura
          EC2_INSTANCE_TYPE="${{ secrets.EC2_INSTANCE_TYPE || 't3.small' }}"
          EC2_MIN_SIZE="${{ secrets.EC2_MIN_SIZE || '1' }}"
          EC2_MAX_SIZE="${{ secrets.EC2_MAX_SIZE || '2' }}"
          EC2_DESIRED_SIZE="${{ secrets.EC2_DESIRED_SIZE || '1' }}"
          EC2_DISK_SIZE="${{ secrets.EC2_DISK_SIZE || '30' }}"

          # Base de datos
          DB_INSTANCE_TYPE="${{ secrets.DB_INSTANCE_TYPE || 'db.t3.micro' }}"
          DB_STORAGE_SIZE="${{ secrets.DB_STORAGE_SIZE || '20' }}"
          DB_STORAGE_MAX="${{ secrets.DB_STORAGE_MAX || '100' }}"
          DB_ENGINE_VERSION="${{ secrets.DB_ENGINE_VERSION || '15.4' }}"
          DB_NAME="${{ secrets.DB_NAME || 'examlab' }}"
          DB_USERNAME="${{ secrets.DB_USERNAME || 'postgres' }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          DB_BACKUP_RETENTION="${{ secrets.DB_BACKUP_RETENTION || '7' }}"

          # Aplicación
          APP_PORT="${{ secrets.APP_PORT || '3000' }}"
          NODE_VERSION="${{ secrets.NODE_VERSION || '20' }}"

          # Supabase (opcional)
          SUPABASE_URL="${{ secrets.SUPABASE_URL || '' }}"
          SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY || '' }}"
          SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}"
          SUPABASE_AI_GENERATE_FUNCTION="${{ secrets.SUPABASE_AI_GENERATE_FUNCTION || 'ai-generate' }}"
          SUPABASE_AI_GRADE_FUNCTION="${{ secrets.SUPABASE_AI_GRADE_FUNCTION || 'ai-grade' }}"
          SUPABASE_AI_FEEDBACK_FUNCTION="${{ secrets.SUPABASE_AI_FEEDBACK_FUNCTION || 'ai-feedback' }}"

          # CloudWatch
          ENABLE_CLOUDWATCH_LOGS="${{ secrets.ENABLE_CLOUDWATCH_LOGS || 'true' }}"
          LOG_RETENTION_DAYS="${{ secrets.LOG_RETENTION_DAYS || '7' }}"

          # Backups
          BACKUP_ENABLED="${{ secrets.BACKUP_ENABLED || 'true' }}"
          BACKUP_BUCKET_NAME="${{ secrets.BACKUP_BUCKET_NAME || '' }}"
          EOF

          chmod +x deploy-vars.env
          echo "✓ Deployment variables generated"
          cat deploy-vars.env | grep -v PASSWORD | grep -v KEY

      # 6️⃣ Validar CloudFormation templates
      - name: Validate CloudFormation templates
        run: |
          cd lovable-aws-deployment

          echo "🔍 Validating CloudFormation templates..."

          for template in cloudformation/*.yaml; do
            echo "  Validating: $template"
            aws cloudformation validate-template \
              --template-body "file://$template" \
              --region ${{ env.AWS_REGION }} > /dev/null
            echo "  ✓ Valid"
          done

      # 7️⃣ Desplegar VPC Stack
      - name: Deploy VPC Stack
        run: |
          cd lovable-aws-deployment

          echo "🚀 Deploying VPC Stack..."

          aws cloudformation deploy \
            --template-file cloudformation/vpc-stack.yaml \
            --stack-name examlab-vpc-${{ secrets.ENVIRONMENT || 'production' }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName="${{ secrets.PROJECT_NAME || 'examlab' }}" \
              Environment="${{ secrets.ENVIRONMENT || 'production' }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

          echo "✓ VPC Stack deployed"

      # 8️⃣ Desplegar RDS Stack
      - name: Deploy RDS Stack
        run: |
          cd lovable-aws-deployment

          echo "🚀 Deploying RDS Stack..."

          aws cloudformation deploy \
            --template-file cloudformation/rds-stack.yaml \
            --stack-name examlab-rds-${{ secrets.ENVIRONMENT || 'production' }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName="${{ secrets.PROJECT_NAME || 'examlab' }}" \
              Environment="${{ secrets.ENVIRONMENT || 'production' }}" \
              DBInstanceType="${{ secrets.DB_INSTANCE_TYPE || 'db.t3.micro' }}" \
              DBStorageSize="${{ secrets.DB_STORAGE_SIZE || '20' }}" \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              DBEngineVersion="${{ secrets.DB_ENGINE_VERSION || '15.4' }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

          echo "✓ RDS Stack deployed"

      # 9️⃣ Desplegar EC2 Stack
      - name: Deploy EC2 Stack
        run: |
          cd lovable-aws-deployment

          echo "🚀 Deploying EC2 Stack..."

          # Generar SSH key si no existe
          KEY_NAME="examlab-${{ secrets.ENVIRONMENT || 'production' }}"

          if ! aws ec2 describe-key-pairs --key-names "$KEY_NAME" --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Creating SSH key pair: $KEY_NAME"
            aws ec2 create-key-pair \
              --key-name "$KEY_NAME" \
              --region ${{ env.AWS_REGION }} \
              --query 'KeyMaterial' \
              --output text > /tmp/$KEY_NAME.pem
            chmod 600 /tmp/$KEY_NAME.pem
            echo "✓ SSH key created"
          else
            echo "✓ SSH key already exists: $KEY_NAME"
          fi

          aws cloudformation deploy \
            --template-file cloudformation/ec2-stack.yaml \
            --stack-name examlab-ec2-${{ secrets.ENVIRONMENT || 'production' }} \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ProjectName="${{ secrets.PROJECT_NAME || 'examlab' }}" \
              Environment="${{ secrets.ENVIRONMENT || 'production' }}" \
              InstanceType="${{ secrets.EC2_INSTANCE_TYPE || 't3.small' }}" \
              KeyName="$KEY_NAME" \
              AppPort="${{ secrets.APP_PORT || '3000' }}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

          echo "✓ EC2 Stack deployed"

      # 🔟 Obtener información de acceso
      - name: Get deployment information
        if: always()
        run: |
          cd lovable-aws-deployment

          echo "📊 Deployment Information"
          echo "=========================="
          echo ""

          # ALB DNS
          ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name examlab-ec2-${{ secrets.ENVIRONMENT || 'production' }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ALBDNSName`].OutputValue' \
            --output text 2>/dev/null || echo "Pending...")

          # RDS Endpoint
          RDS_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name examlab-rds-${{ secrets.ENVIRONMENT || 'production' }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs[?OutputKey==`RDSEndpoint`].OutputValue' \
            --output text 2>/dev/null || echo "Pending...")

          echo "🌐 Application URL:"
          echo "   http://$ALB_DNS"
          echo ""
          echo "🔑 SSH Access:"
          echo "   ssh -i <your-key>.pem ec2-user@$ALB_DNS"
          echo ""
          echo "💾 Database:"
          echo "   Endpoint: $RDS_ENDPOINT"
          echo "   Database: ${{ secrets.DB_NAME || 'examlab' }}"
          echo ""
          echo "📍 Stack Information:"
          echo "   Project: ${{ secrets.PROJECT_NAME || 'examlab' }}"
          echo "   Environment: ${{ secrets.ENVIRONMENT || 'production' }}"
          echo "   Region: ${{ env.AWS_REGION }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"

      # 1️⃣1️⃣ Create Deployment Status
      - name: Create deployment status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.deployments.createStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: 'success',
              description: 'Deployment to AWS completed successfully',
              environment_url: 'https://console.aws.amazon.com/cloudformation'
            })

      # 1️⃣2️⃣ Notificar en caso de error
      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ AWS deployment failed. Check the workflow logs for details.'
            })

      # 1️⃣3️⃣ Upload deployment logs
      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-logs
          path: |
            /tmp/*.log
            deploy-vars.env
          retention-days: 30

