AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ExamLab — Java code execution Lambda runner.
  Diseñado para correr dentro de AWS Always Free tier:
   - Lambda: 1M invocaciones/mes + 400K GB-segundos
   - Function URL (sin API Gateway, sin cuota de 12 meses)
   - CloudWatch Logs con retención corta (5GB Always Free)
  Las únicas dependencias externas son: ECR (la imagen del runner) y
  el shared secret `ApiKey` que el edge function debe enviar en X-API-Key.

Parameters:
  ImageUri:
    Type: String
    Description: >
      URI completo de la imagen ECR del runner.
      Formato: <ACCOUNT>.dkr.ecr.<REGION>.amazonaws.com/examlab-code-runner:<TAG>
  ApiKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: >
      Shared secret que el edge function `execute-code` debe enviar en
      el header X-API-Key. Si lo pierdes, redeploy el stack con uno
      nuevo (el viejo queda inutilizable).
  LambdaTimeoutSeconds:
    Type: Number
    Default: 50
    MinValue: 30
    MaxValue: 60
    Description: >
      Timeout duro de la Lambda. Debe cubrir cold start (~3-5s) +
      compile (hasta 25s en cold) + execute (hasta 20s) con margen.
      50s deja ~5s de holgura sobre el peor caso.
  LambdaMemoryMB:
    Type: Number
    Default: 1769
    AllowedValues: [1024, 1536, 1769, 2048, 3008]
    Description: >
      Memoria de la función Lambda. AWS asigna CPU proporcional a la
      memoria — 1769 MB es el punto exacto donde Lambda da **1 vCPU
      completo**. Por debajo de eso, la compilación de javac (CPU-bound)
      tarda 3-5× más, llevando cold starts a 10-15s.
      Recomendado: 1769 (1 vCPU). 2048+ acelera más pero gasta más
      GB-segundos del free tier.
  LogRetentionDays:
    Type: Number
    Default: 7
    AllowedValues: [1, 3, 5, 7, 14, 30]
    Description: Días de retención de logs en CloudWatch. 7 es un buen balance debug-vs-costo.

Resources:
  # ── IAM role mínimo ──
  # Solo permisos para escribir CloudWatch Logs. SIN acceso a S3, DDB,
  # Secrets Manager ni nada más. Si el código del alumno hace
  # subprocess.run(["aws", "s3", "ls"]), recibe AccessDenied: no puede
  # tocar tu cuenta AWS.
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - { Key: app, Value: examlab }
        - { Key: component, Value: code-runner }

  # ── Función Lambda (container image) ──
  RunnerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: examlab-code-runner
      Description: ExamLab Java code execution sandbox (OpenJDK 21 en Lambda)
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Role: !GetAtt ExecutionRole.Arn
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: !Ref LambdaMemoryMB
      Environment:
        Variables:
          API_KEY: !Ref ApiKey
      # SIN VpcConfig: el código del alumno no puede alcanzar tu VPC ni
      # internet privada. Las llamadas DNS van por el resolver de Lambda,
      # pero como el role no tiene permisos AWS, no puede exfiltrar nada
      # a través de servicios autenticados.
      Tags:
        - { Key: app, Value: examlab }
        - { Key: component, Value: code-runner }

  # ── API Gateway HTTP API ──
  # Reemplazamos la Lambda Function URL (que devolvía 403 en algunos
  # AWS accounts por SCPs/account-level policies que bloquean Principal=*
  # con AuthType=NONE). HTTP API Gateway es el camino "blessed" para
  # exponer Lambda con auth custom. Costo: $1/M requests después de
  # los 12 meses gratuitos, despreciable a nuestra escala.
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: examlab-code-runner-api
      ProtocolType: HTTP
      Description: HTTP API frente al Lambda runner
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["POST"]
        AllowHeaders: ["content-type", "x-api-key"]
        MaxAge: 86400

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt RunnerFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: "2.0"
      TimeoutInMillis: 29000 # max HTTP API timeout

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /run"
      AuthorizationType: NONE
      Target: !Sub "integrations/${HttpApiIntegration}"

  # Catch-all route con $default sirve para que cualquier path/method
  # devuelva al menos una respuesta del Lambda (sin esto, una URL mal
  # copiada da 403 críptico de API Gateway en lugar de 404 manejable).
  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      AuthorizationType: NONE
      Target: !Sub "integrations/${HttpApiIntegration}"

  # Permite que API Gateway invoque la Lambda. SourceArn permisivo
  # para cubrir tanto POST /run como el catch-all $default.
  HttpApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RunnerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  # ── Log group con retención corta ──
  # Sin esto, CloudWatch crea uno auto con retención "never expire" y
  # llena el free tier de 5GB en pocos días bajo carga.
  RunnerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${RunnerFunction}"
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  RunnerUrl:
    Description: >
      URL del endpoint POST /run. Guárdala en Supabase Edge Function
      Secrets como AWS_RUNNER_URL. Termina en /run (no añadir slash final).
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/run"
    Export:
      Name: !Sub "${AWS::StackName}-RunnerUrl"
  FunctionArn:
    Description: ARN de la función Lambda.
    Value: !GetAtt RunnerFunction.Arn
  LogGroupName:
    Description: CloudWatch Logs group para debug.
    Value: !Ref RunnerLogGroup
