# ═══════════════════════════════════════════════════════════════════════════════
# Supabase Configuration
# ═══════════════════════════════════════════════════════════════════════════════

[project]
project_id = "examlab"
name = "ExamLab"
region = "us-east-1"

[database]
port = 5432
major_version = 15

[api]
enabled = true
port = 3000
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = false
password_min_length = 6
password_require_uppercase = false
password_require_lowercase = false
password_require_numbers = false
password_require_special = false

[realtime]
enabled = true
max_bytes_per_second = 100
max_concurrent_users = 200
max_event_channels = 100

[storage]
file_size_limit = "50MiB"
s3_host = "storage.googleapis.com"
s3_region = "auto"
s3_access_key = "mock"
s3_secret_key = "mock"
s3_bucket = "stub"

[edge_runtime]
enabled = true
policy_pins = []

[functions."ai-generate"]
enabled = true
verify_jwt = true

[functions."ai-grade"]
enabled = true
verify_jwt = true

[functions."ai-feedback"]
enabled = true
verify_jwt = true

# Calendar RPC — requiere JWT del docente para identificarlo.
[functions."calendar"]
enabled = true
verify_jwt = true

# OAuth callback público — Google manda el redirect sin Authorization.
# Sin verify_jwt = false el callback rebota con 401 y el flujo se rompe.
[functions."calendar-oauth-callback"]
enabled = true
verify_jwt = false

# send-push lo llama un trigger de Postgres vía pg_net. No queremos
# meter el service_role_key en DB settings (riesgo de exposición),
# así que apagamos verify_jwt y validamos con un shared secret
# (PUSH_TRIGGER_SECRET) dentro del propio handler.
[functions."send-push"]
enabled = true
verify_jwt = false

# retry-failed-ai-gradings lo invoca pg_cron via trigger SQL con
# X-Trigger-Secret (RETRY_TRIGGER_SECRET). No hay user JWT — apagamos
# verify_jwt y validamos con el shared secret dentro del handler.
[functions."retry-failed-ai-gradings"]
enabled = true
verify_jwt = false

# ai-grading-worker drena la cola ai_grading_queue. Lo invoca pg_cron
# (Bearer service_role_key) y el panel Cron (Bearer user JWT). El
# service_role key NO siempre es un JWT parseable (proyectos con el
# sistema nuevo de keys sb_secret_*), así que el gateway con verify_jwt
# lo rebota con UNAUTHORIZED_INVALID_JWT_FORMAT. Apagamos verify_jwt y
# validamos dentro del handler: service_role key O usuario Admin/Docente.
[functions."ai-grading-worker"]
enabled = true
verify_jwt = false

# ai-generation-worker drena la cola ai_generation_queue (generación de
# preguntas, archivos y contenido didáctico con IA). Misma arquitectura
# que ai-grading-worker: invocado por pg_cron + UI con user JWT. El
# handler valida el service_role / Admin / creator del job internamente.
[functions."ai-generation-worker"]
enabled = true
verify_jwt = false

# ai-grade-submission la llaman: el frontend (Bearer user JWT) y otros
# edge functions server-side — ai-grading-worker y retry-failed-ai-gradings
# — con Bearer service_role_key. Mismo problema de formato de key que
# arriba. verify_jwt = false + auth interna: X-Trigger-Secret, service_role
# key, o user JWT válido (ver isSystemTrigger en el handler).
[functions."ai-grade-submission"]
enabled = true
verify_jwt = false

# Custom password reset — el usuario NO está autenticado cuando pide
# el reset (paso 1) ni cuando lo confirma con el token (paso 2). Las
# dos funciones se invocan con anon key + body que trae el email o el
# token. La seguridad la dan: tokens single-use con 1h de vigencia
# (tabla password_reset_tokens) + no-enumeration en la respuesta.
[functions."request-password-reset"]
enabled = true
verify_jwt = false

[functions."confirm-password-reset"]
enabled = true
verify_jwt = false

# db-backup-runner exporta tablas a un ZIP en Storage. Lo invoca pg_cron
# semanal (Bearer service_role_key) y la UI Admin (Bearer user JWT).
# Mismo problema de formato de key que ai-grading-worker — apagamos
# verify_jwt y validamos dentro del handler: service_role key O user
# con rol Admin.
[functions."db-backup-runner"]
enabled = true
verify_jwt = false

[logging]
vector_enabled = false
postgres_enabled = false

[analytics]
enabled = false

[vector]
enabled = false
